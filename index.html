<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram - Demo Purpose</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 64px;
            max-width: 1200px;
            width: 100%;
        }

        /* Left side - Phone Mockup */
        .phone-mockup {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex: 1;
            min-width: 300px;
        }

        .phone {
            width: 340px;
            height: 600px;
            background: #fff;
            border-radius: 40px;
            border: 12px solid #000;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }

        .phone-status {
            height: 44px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 12px;
            font-weight: 600;
            border-bottom: 1px solid #e5e5e5;
        }

        .status-left, .status-right {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .phone-content {
            flex: 1;
            overflow-y: auto;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 24px;
        }

        /* Right side - Login Form */
        .login-container {
            flex: 1;
            max-width: 400px;
        }

        .login-form {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            padding: 0;
            margin-bottom: 20px;
        }

        .login-header {
            padding: 48px 40px 24px;
            text-align: center;
            border-bottom: 1px solid #dbdbdb;
        }

        .instagram-logo {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -1px;
            font-style: italic;
        }

        .login-subtitle {
            color: #8a8a8a;
            font-size: 13px;
            margin-top: 8px;
        }

        .form-inputs {
            padding: 0 40px;
            padding-top: 24px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px 10px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #bdbdbd;
            background: #fff;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.05);
        }

        input::placeholder {
            color: #a6a6a6;
        }

        .form-messages {
            padding: 0 40px;
        }

        .form-error {
            background: #fff3cd;
            color: #d63031;
            padding: 8px 10px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 12px;
            border: 1px solid #f5a5a5;
            display: none;
            animation: shake 0.3s ease;
        }

        .form-error.show {
            display: block;
        }

        .form-success {
            background: #d4edda;
            color: #155724;
            padding: 8px 10px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 12px;
            border: 1px solid #c3e6cb;
            display: none;
        }

        .form-success.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .login-btn {
            width: 100%;
            padding: 8px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            transition: opacity 0.2s ease;
        }

        .login-btn:hover:not(:disabled) {
            opacity: 0.8;
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 16px 0;
            gap: 12px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #dbdbdb;
        }

        .divider-text {
            font-size: 13px;
            color: #8a8a8a;
            font-weight: 600;
        }

        .facebook-btn {
            width: 100%;
            padding: 8px;
            background: #0a66c2;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 16px;
            transition: opacity 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .facebook-btn:hover:not(:disabled) {
            opacity: 0.8;
        }

        .forgot-password {
            text-align: center;
            font-size: 12px;
            color: #003569;
            text-decoration: none;
            margin-bottom: 24px;
            display: block;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .signup-section {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            padding: 16px;
            text-align: center;
            font-size: 14px;
            color: #262626;
            margin-bottom: 20px;
        }

        .signup-link {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link:hover {
            text-decoration: underline;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Dashboard */
        .dashboard-panel {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            padding: 16px;
            max-width: 400px;
            max-height: 400px;
            overflow-y: auto;
        }

        .dashboard-header {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #dbdbdb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .login-count-badge {
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            color: #262626;
        }

        .login-item {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px;
            animation: slideIn 0.3s ease;
        }

        .login-item:last-child {
            border-bottom: none;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-item-username {
            font-weight: 600;
            color: #262626;
            margin-bottom: 4px;
        }

        .login-item-time {
            color: #8a8a8a;
            font-size: 12px;
        }

        .login-item-details {
            color: #8a8a8a;
            font-size: 12px;
            margin-top: 4px;
        }

        .no-logins {
            text-align: center;
            padding: 40px 20px;
            color: #8a8a8a;
        }

        .no-logins i {
            font-size: 32px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .clear-btn {
            width: 100%;
            padding: 8px;
            background: #f0f0f0;
            color: #262626;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: opacity 0.2s ease;
            display: none;
        }

        .clear-btn:hover {
            opacity: 0.7;
        }

        .clear-btn.show {
            display: block;
        }

        @media (max-width: 900px) {
            .container {
                flex-direction: column;
                gap: 30px;
            }

            .phone {
                width: 100%;
                max-width: 340px;
                margin: 0 auto;
            }

            .login-container {
                max-width: 100%;
            }
        }

        @media (max-width: 600px) {
            .phone {
                width: 100%;
                height: auto;
                min-height: 400px;
                border-radius: 0;
                border: none;
            }

            .container {
                gap: 20px;
            }

            .login-form {
                border: none;
                background: #fafafa;
            }

            .login-header {
                padding: 32px 20px;
            }

            .form-inputs {
                padding: 0 20px;
            }

            .form-messages {
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Phone Mockup (Left) -->
        <div class="phone-mockup">
            <div class="phone">
                <div class="phone-status">
                    <span class="status-left">
                        <i class="fas fa-signal"></i>
                        <span>Carrier</span>
                    </span>
                    <span>9:41</span>
                    <span class="status-right">
                        <i class="fas fa-battery-full"></i>
                    </span>
                </div>
                <div class="phone-content">
                    <div style="text-align: center; font-size: 48px; margin-bottom: 20px;">📸</div>
                    <div style="font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 8px;">Instagram</div>
                    <div style="font-size: 13px; color: #8a8a8a; text-align: center;">Demo Purpose</div>
                </div>
            </div>
        </div>

        <!-- Right side - Login & Dashboard -->
        <div class="login-container">
            <!-- Login Form -->
            <div class="login-form">
                <div class="login-header">
                    <div class="instagram-logo">Instagram</div>
                    <div class="login-subtitle">Demo Purpose - Login & Data Saving</div>
                </div>

                <form id="loginForm">
                    <div class="form-messages">
                        <div class="form-error" id="errorMessage"></div>
                        <div class="form-success" id="successMessage"></div>
                    </div>

                    <div class="form-inputs">
                        <!-- Phone/Email/Username -->
                        <div class="form-group">
                            <input 
                                type="text" 
                                id="username" 
                                placeholder="Phone number, username, or email"
                                autocomplete="off"
                            >
                        </div>

                        <!-- Password -->
                        <div class="form-group">
                            <input 
                                type="password" 
                                id="password" 
                                placeholder="Password"
                                autocomplete="off"
                            >
                        </div>

                        <button type="submit" class="login-btn" id="loginBtn">
                            Log in
                        </button>

                        <div class="divider">
                            <span class="divider-text">OR</span>
                        </div>

                        <button type="button" class="facebook-btn" onclick="showFacebookAuth()">
                            <i class="fab fa-facebook"></i> Log in with Facebook
                        </button>

                        <a href="#" class="forgot-password" onclick="event.preventDefault(); showError('Forgot password feature coming soon')">Forgot password?</a>
                    </div>
                </form>
            </div>

            <!-- Signup Section -->
            <div class="signup-section">
                Don't have an account? <a href="#" class="signup-link" onclick="event.preventDefault(); showError('Sign up feature coming soon')">Sign up</a>
            </div>

            <!-- Dashboard -->
            <div class="dashboard-panel">
                <div class="dashboard-header">
                    <span>💾 Saved Logins</span>
                    <span class="login-count-badge" id="loginCount">0</span>
                </div>
                <div id="loginsList">
                    <div class="no-logins">
                        <i class="fas fa-inbox"></i>
                        <p>No logins saved yet</p>
                    </div>
                </div>
                <button class="clear-btn" id="clearBtn" onclick="clearAllLogins()">
                    <i class="fas fa-trash"></i> Clear All
                </button>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loginBtn = document.getElementById('loginBtn');
        const loginsList = document.getElementById('loginsList');
        const loginCount = document.getElementById('loginCount');
        const clearBtn = document.getElementById('clearBtn');

        // Validate email
        function validateEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // Show error
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 3500);
        }

        // Show success
        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
            setTimeout(() => {
                successMessage.classList.remove('show');
            }, 2500);
        }

        // Save login data
        function saveLoginData(username, password) {
            const loginData = {
                username: username,
                password: password,
                timestamp: new Date().toLocaleString(),
                loginTime: new Date().toISOString(),
                id: Date.now()
            };

            let allLogins = [];
            const stored = localStorage.getItem('instagramDemoLogins');
            if (stored) {
                try {
                    allLogins = JSON.parse(stored);
                } catch (e) {
                    allLogins = [];
                }
            }
            
            allLogins.push(loginData);
            localStorage.setItem('instagramDemoLogins', JSON.stringify(allLogins));
            
            console.log('✅ Login Saved:', loginData);
            console.log('📊 All Logins:', allLogins);

            // Update dashboard
            updateDashboard();
        }

        // Update dashboard
        function updateDashboard() {
            const stored = localStorage.getItem('instagramDemoLogins');
            let logins = [];
            
            if (stored) {
                try {
                    logins = JSON.parse(stored);
                } catch (e) {
                    logins = [];
                }
            }

            loginCount.textContent = logins.length;

            if (logins.length === 0) {
                loginsList.innerHTML = `
                    <div class="no-logins">
                        <i class="fas fa-inbox"></i>
                        <p>No logins saved yet</p>
                    </div>
                `;
                clearBtn.classList.remove('show');
            } else {
                clearBtn.classList.add('show');
                loginsList.innerHTML = logins
                    .reverse()
                    .map(login => `
                        <div class="login-item">
                            <div class="login-item-username">👤 ${escapeHtml(login.username)}</div>
                            <div class="login-item-time">${login.timestamp}</div>
                            <div class="login-item-details">
                                <i class="fas fa-lock"></i> Password: ${login.password ? '••••••••' : 'N/A'}
                            </div>
                        </div>
                    `).join('');
            }
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Clear all logins
        function clearAllLogins() {
            if (confirm('Delete all saved logins?')) {
                localStorage.removeItem('instagramDemoLogins');
                updateDashboard();
                showSuccess('✅ All data cleared');
            }
        }

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            // Validation
            if (!username || !
