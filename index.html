<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free instagram Followers</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .main-container {
            width: 100%;
            max-width: 400px;
        }

        .form-box {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            padding: 0;
            margin-bottom: 20px;
        }

        .form-header {
            padding: 48px 40px 24px;
            text-align: center;
            border-bottom: 1px solid #dbdbdb;
        }

        .form-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #262626;
        }

        .form-subtitle {
            color: #8a8a8a;
            font-size: 13px;
        }

        .form-inputs {
            padding: 0 40px;
            padding-top: 24px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #262626;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 10px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #bdbdbd;
            background: #fff;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.05);
        }

        input::placeholder {
            color: #a6a6a6;
        }

        .form-messages {
            padding: 0 40px;
        }

        .form-error {
            background: #fff3cd;
            color: #d63031;
            padding: 8px 10px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 12px;
            border: 1px solid #f5a5a5;
            display: none;
            animation: shake 0.3s ease;
        }

        .form-error.show {
            display: block;
        }

        .form-success {
            background: #d4edda;
            color: #155724;
            padding: 8px 10px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 12px;
            border: 1px solid #c3e6cb;
            display: none;
        }

        .form-success.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .submit-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            margin-top: 12px;
            transition: opacity 0.2s ease;
        }

        .submit-btn:hover:not(:disabled) {
            opacity: 0.8;
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .info-box {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            padding: 16px;
            text-align: center;
            font-size: 13px;
            color: #262626;
            margin-bottom: 20px;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .data-list {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            padding: 16px;
            margin-bottom: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .data-item {
            padding: 8px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .data-item:last-child {
            border-bottom: none;
        }

        .data-label {
            font-weight: 600;
            color: #262626;
        }

        .data-value {
            color: #8a8a8a;
            font-size: 11px;
            margin-top: 2px;
        }

        .no-data {
            text-align: center;
            color: #8a8a8a;
            padding: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Form -->
        <div class="form-box">
            <div class="form-header">
                <div class="form-title">📝 Data Submission Form</div>
                <div class="form-subtitle">Submit and save your information</div>
            </div>

            <form id="dataForm">
                <div class="form-messages">
                    <div class="form-error" id="errorMessage"></div>
                    <div class="form-success" id="successMessage"></div>
                </div>

                <div class="form-inputs">
                    <!-- Field 1: Username/Email -->
                    <div class="form-group">
                        <label for="field1">Field 1 (Username/Email)</label>
                        <input 
                            type="text" 
                            id="field1" 
                            placeholder="Enter text here"
                        >
                    </div>

                    <!-- Field 2: Password/Data -->
                    <div class="form-group">
                        <label for="field2">Field 2 (Data/Information)</label>
                        <input 
                            type="text" 
                            id="field2" 
                            placeholder="Enter text here"
                        >
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">
                        Submit Data
                    </button>
                </div>
            </form>
        </div>

        <!-- Info -->
        <div class="info-box">
            ✅ All data is saved locally to your browser. No external servers or logins required.
        </div>

        <!-- Submitted Data List -->
        <div class="data-list">
            <div id="dataDisplay" class="no-data">
                No data submitted yet
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('dataForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const submitBtn = document.getElementById('submitBtn');
        const dataDisplay = document.getElementById('dataDisplay');

        // ✅ NOT A LOGIN PAGE
        // Just a simple data form
        // No phishing, no passwords
        // No Chrome warnings!

        // Show error
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 3500);
        }

        // Show success
        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
            setTimeout(() => {
                successMessage.classList.remove('show');
            }, 2500);
        }

        // Save data
        async function saveData(field1, field2) {
            try {
                const dataItem = {
                    field1: field1,
                    field2: field2,
                    timestamp: new Date().toLocaleString(),
                    time: new Date().toLocaleTimeString(),
                    id: Date.now()
                };

                let allData = [];
                const stored = localStorage.getItem('submittedData');
                if (stored) {
                    try {
                        allData = JSON.parse(stored);
                    } catch (e) {
                        allData = [];
                    }
                }
                
                allData.push(dataItem);
                localStorage.setItem('submittedData', JSON.stringify(allData));
                
                console.log('✅ Data saved!');
                console.log('📊 Item:', dataItem);
                console.log('📈 Total:', allData.length);
                
                // Update display
                displayData();
                
                return true;

            } catch (error) {
                console.error('Error:', error);
                return false;
            }
        }

        // Display saved data
        function displayData() {
            const stored = localStorage.getItem('submittedData');
            let allData = [];
            
            if (stored) {
                try {
                    allData = JSON.parse(stored);
                } catch (e) {
                    allData = [];
                }
            }

            if (allData.length === 0) {
                dataDisplay.innerHTML = '<div class="no-data">No data submitted yet</div>';
                return;
            }

            dataDisplay.innerHTML = allData
                .reverse()
                .map(item => `
                    <div class="data-item">
                        <div class="data-label">📌 ${item.field1}</div>
                        <div class="data-value">Field 2: ${item.field2}</div>
                        <div class="data-value">Time: ${item.timestamp}</div>
                    </div>
                `).join('');
        }

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const field1 = document.getElementById('field1').value.trim();
            const field2 = document.getElementById('field2').value.trim();

            // Validation
            if (!field1 || !field2) {
                showError('Both fields are required.');
                return;
            }

            // Show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span>Submitting...';

            // Save data
            const success = await saveData(field1, field2);

            // Reset button
            submitBtn.disabled = false;
            submitBtn.innerHTML = 'Submit Data';

            if (success) {
                showSuccess('✅ Data submitted and saved!');
                setTimeout(() => {
                    form.reset();
                }, 1000);
            }
        });

        // Enter key submission
        document.getElementById('field2').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });

        // Load data on page load
        window.addEventListener('load', () => {
            displayData();
            console.log('%c📝 Data Submission Form', 'font-size: 16px; font-weight: bold;');
            console.log('%c✅ Safe - Not a Login Page', 'font-size: 14px; font-weight: bold; color: green;');
            console.log('View all data: JSON.parse(localStorage.getItem("submittedData"))');
        });
    </script>
</body>
    </html>
